version: "3.8"

services:
  redis:
    image: redis:latest
    container_name: streampulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    container_name: streampulse-postgres
    environment:
      POSTGRES_USER: streampulse
      POSTGRES_PASSWORD: streampulse_secure_password
      POSTGRES_DB: streampulse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streampulse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  postgres_data:
